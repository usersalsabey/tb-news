[phases.setup]
nixPkgs = ["php82", "php82Extensions.mbstring", "php82Extensions.xml", "php82Extensions.tokenizer", "php82Extensions.pdo", "php82Extensions.pdo_mysql", "php82Extensions.intl", "php82Extensions.zip", "nodejs_20", "composer"]

[phases.build]
cmds = [
    "composer install --no-dev --optimize-autoloader",
    "npm install --max-old-space-size=512",
    "npm run build",
    "php artisan config:clear",
    "php artisan view:clear",
    "php artisan cache:clear"
]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"